name: MiniLang Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build MiniLang
        run: make native

      - name: Run test suite
        run: cd tests && bash run_tests.sh
